apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-blazor-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-blazor-server
  template:
    metadata:
      labels:
        app: sample-blazor-server
    spec:
      containers:
        - name: sample-blazor-server
          image: sample-blazor-server:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: BLAZOR_MESSAGE
              value: "Hello from minikube Blazor Server."
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sample-blazor-server
spec:
  type: ClusterIP
  selector:
    app: sample-blazor-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
