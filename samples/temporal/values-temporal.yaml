# Temporal Helm values for local minikube.
# PostgreSQL is installed separately by values-postgresql.yaml.

server:
  enabled: true
  replicaCount: 1

  # Temporal Server 1.30+ images use the current config templating path.
  shims:
    dockerize: false
    elasticsearchTool: false

  config:
    logLevel: "debug,info"
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 512
      datastores:
        default:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal
            connectAddr: "temporal-postgresql:5432"
            connectProtocol: tcp
            user: postgres
            password: temporal
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"
        visibility:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal_visibility
            connectAddr: "temporal-postgresql:5432"
            connectProtocol: tcp
            user: postgres
            password: temporal
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"

admintools:
  enabled: true

web:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
